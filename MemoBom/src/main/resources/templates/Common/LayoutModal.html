<div xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	class="modal-container bg-white shadow-lg relative w-full sm:w-auto rounded-t-2xl sm:rounded-lg"
	role="dialog" aria-modal="true" style="max-height: min(100dvh, calc(100vh - 0px));">

	<div class="modal-header bg-gray-700 text-white text-center p-3 sm:p-4 sm:cursor-move"
		onmousedown="startDrag(event, this)">
		<span class="font-bold pr-8">
			<th:block layout:fragment="modalTitle" />
		</span>
		<button type="button" onclick="closePopup(this)"
			class="absolute top-2 right-2 text-white hover:text-gray-300 text-dynamic-xl" aria-label="Close">❌</button>
	</div>

	<div class="modal-content p-4 overflow-y-auto max-h-[calc(100dvh-11rem)] sm:max-h-[75dvh]">
		<th:block layout:fragment="modalContent" />
	</div>

	<div class="modal-footer p-3 sm:p-4 flex justify-end gap-2 border-t border-gray-100">
		<th:block layout:fragment="modalButton" />
	</div>

	<th:block layout:fragment="modalScript" />
</div>
