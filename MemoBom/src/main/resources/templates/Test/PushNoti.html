<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{Common/LayoutBase}">

<th:block layout:fragment="title">PushNoti Test</th:block>
<head>
	<th:block layout:fragment="css">
		<link rel="manifest" th:href="@{/manifest.webmanifest}" />
		<meta name="theme-color" content="#0f172a" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
	</th:block>
</head>

<body>

	<th:block layout:fragment="header">
		<div class="h-12 flex items-center justify-between px-3">
			<div class="font-bold text-slate-900">PushNoti Test</div>
			<div class="text-dynamic-xs text-slate-500">PWA / Push</div>
		</div>
	</th:block>

	<th:block layout:fragment="content">
		<div class="max-w-xl mx-auto space-y-3">
			<div class="bg-white rounded-xl border border-gray-200 p-4 space-y-2">
				<div class="font-semibold text-slate-900">푸시 등록 테스트</div>
				<div class="grid grid-cols-2 gap-2">
					<button type="button" class="px-3 py-2 rounded-lg bg-slate-900 text-white hover:bg-slate-800" onclick="subscribePush()">구독 등록</button>
					<button type="button" class="px-3 py-2 rounded-lg border border-gray-200 hover:bg-gray-50" onclick="unsubscribePush()">구독 해제</button>
					<button type="button" class="px-3 py-2 rounded-lg border border-gray-200 hover:bg-gray-50" onclick="loadPushStatus()">수신 상태 조회</button>
					<button type="button" class="px-3 py-2 rounded-lg border border-gray-200 hover:bg-gray-50" onclick="togglePushStatus()">수신 상태 토글</button>
				</div>
			</div>

			<div class="bg-white rounded-xl border border-gray-200 p-4 space-y-2">
				<div class="font-semibold text-slate-900">푸시 발송 테스트</div>
				<input id="userNo" type="number" min="1" placeholder="수신 userNo 입력"
					class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-200" />
				<div class="flex gap-2">
					<button type="button" class="flex-1 px-3 py-2 rounded-lg bg-slate-900 text-white hover:bg-slate-800" onclick="sendTestPush()">기본 Push 발송</button>
				</div>
			</div>
		</div>
	</th:block>

	<th:block layout:fragment="script">
		<script type="text/javascript" th:src="@{/js/pwa.js(v=${assetVersion})}"></script>
		<script th:inline="javascript">
			let currentEnabled = null;

			async function subscribePush() {
				try {
					const result = await PWA_PUSH.subscribeDevice();
					if (!result.ok) {
						showToast("실패", "구독 등록 실패: " + result.reason, ToastType.ERROR, 2000);
						return;
					}
					showToast("완료", "구독 등록 완료", ToastType.SUCCESS, 1500);
				} catch (e) {
					console.error(e);
					showToast("오류", "구독 등록 중 오류", ToastType.ERROR, 2000);
				}
			}

			async function unsubscribePush() {
				try {
					const result = await PWA_PUSH.unsubscribeDevice();
					showToast("완료", result.unsubscribed ? "구독 해제 완료" : "구독 정보가 없습니다.", ToastType.INFO, 1800);
				} catch (e) {
					console.error(e);
					showToast("오류", "구독 해제 중 오류", ToastType.ERROR, 2000);
				}
			}

			async function loadPushStatus() {
				try {
					currentEnabled = await PWA_PUSH.getUserPushStatus();
					showToast("수신 상태", currentEnabled ? "활성화" : "비활성화", ToastType.INFO, 1800);
				} catch (e) {
					console.error(e);
					showToast("오류", "수신 상태 조회 실패", ToastType.ERROR, 2000);
				}
			}

			async function togglePushStatus() {
				try {
					if (currentEnabled === null) {
						currentEnabled = await PWA_PUSH.getUserPushStatus();
					}
					currentEnabled = await PWA_PUSH.setUserPushStatus(!currentEnabled);
					showToast("완료", currentEnabled ? "수신 활성화" : "수신 비활성화", ToastType.SUCCESS, 1800);
				} catch (e) {
					console.error(e);
					showToast("오류", "수신 상태 변경 실패", ToastType.ERROR, 2000);
				}
			}

			async function sendTestPush() {
				const userNo = document.getElementById("userNo").value;
				if (!userNo) {
					showToast("확인", "userNo를 입력해 주세요.", ToastType.WARNING, 1800);
					return;
				}

				try {
					const res = await apiPost("/Test/sendPush.json", userNo);
					if (res?.code === "0") {
						showToast("완료", "Push 발송 성공", ToastType.SUCCESS, 1800);
					} else {
						showToast("실패", res?.message || "Push 발송 실패", ToastType.ERROR, 2000);
					}
				} catch (e) {
					console.error(e);
					showToast("오류", "Push 발송 중 오류", ToastType.ERROR, 2000);
				}
			}
		</script>
	</th:block>

</body>
</html>
