<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{Common/LayoutBase}">

<th:block layout:fragment="title">Push Notification Test</th:block>

<body>
<th:block layout:fragment="header">
	<div class="h-12 flex items-center justify-between px-3">
		<div class="font-bold text-slate-900">TestPushController</div>
		<div class="text-dynamic-xs text-slate-500">Push Test</div>
	</div>
</th:block>

<th:block layout:fragment="content">
	<div class="max-w-2xl mx-auto p-3 space-y-3">
		<div class="bg-white rounded-xl border border-gray-200 p-4 space-y-3">
			<div class="font-semibold">1) 브라우저 푸시 구독</div>
			<div class="flex gap-2">
				<button class="px-3 py-2 rounded-lg bg-slate-900 text-white" onclick="subscribePush()">구독 등록</button>
				<button class="px-3 py-2 rounded-lg border border-gray-300" onclick="unsubscribePush()">구독 해제</button>
			</div>
			<pre id="subResult" class="text-dynamic-xs bg-slate-50 p-2 rounded"></pre>
		</div>

		<div class="bg-white rounded-xl border border-gray-200 p-4 space-y-3">
			<div class="font-semibold">2) 서버 푸시 발송 테스트</div>
			<input id="userNo" type="number" class="w-full border border-gray-300 rounded px-3 py-2" placeholder="수신 대상 userNo" />
			<div>
				<button class="px-3 py-2 rounded-lg bg-blue-600 text-white" onclick="sendPush()">푸시 발송</button>
			</div>
			<pre id="sendResult" class="text-dynamic-xs bg-slate-50 p-2 rounded"></pre>
		</div>

		<div class="bg-white rounded-xl border border-gray-200 p-4 space-y-3">
			<div class="font-semibold">3) VAPID Key 생성 (MemoBomApplication.checkProperty 로직 참조)</div>
			<div>
				<button class="px-3 py-2 rounded-lg bg-emerald-700 text-white" onclick="generateVapidKey()">키 생성</button>
			</div>
			<pre id="keyResult" class="text-dynamic-xs bg-slate-50 p-2 rounded whitespace-pre-wrap"></pre>
		</div>
	</div>
</th:block>

<th:block layout:fragment="script">
	<script type="text/javascript" th:src="@{/js/pwa.js(v=${assetVersion})}"></script>
	<script>
		function pretty(v) {
			return JSON.stringify(v, null, 2);
		}

		async function subscribePush() {
			const out = document.getElementById('subResult');
			try {
				const result = await window.PWA_PUSH.subscribeDevice();
				out.textContent = pretty(result);
			} catch (e) {
				out.textContent = String(e);
			}
		}

		async function unsubscribePush() {
			const out = document.getElementById('subResult');
			try {
				const result = await window.PWA_PUSH.unsubscribeDevice();
				out.textContent = pretty(result);
			} catch (e) {
				out.textContent = String(e);
			}
		}

		async function sendPush() {
			const out = document.getElementById('sendResult');
			const userNo = document.getElementById('userNo').value;
			if (!userNo) {
				out.textContent = 'userNo를 입력해 주세요.';
				return;
			}
			try {
				const res = await apiPost((window.contextPath || '') + '/TestPush/SendPush.json', String(userNo));
				out.textContent = pretty(res);
			} catch (e) {
				out.textContent = String(e);
			}
		}

		async function generateVapidKey() {
			const out = document.getElementById('keyResult');
			try {
				const res = await apiPost((window.contextPath || '') + '/TestPush/GenerateVapidKey.json', {});
				out.textContent = pretty(res);
			} catch (e) {
				out.textContent = String(e);
			}
		}
	</script>
</th:block>
</body>
</html>
