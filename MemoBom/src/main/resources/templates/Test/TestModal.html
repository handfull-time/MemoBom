<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{Common/LayoutBase}">

<th:block layout:fragment="title">Modal Test</th:block>

<th:block layout:fragment="header">
	<div class="h-full flex items-center justify-center font-semibold">Modal Test</div>
</th:block>

<th:block layout:fragment="content">
	<section class="max-w-xl mx-auto p-4 space-y-4">
		<p class="text-sm text-gray-600">모바일 대응 모달을 테스트하기 위한 페이지입니다.</p>
		<div class="grid gap-3">
			<button type="button"
				class="w-full rounded-lg bg-blue-600 text-white py-3 font-semibold"
				onclick="openSampleModal('640px')">기본 모달 열기</button>
			<button type="button"
				class="w-full rounded-lg bg-slate-700 text-white py-3 font-semibold"
				onclick="openSampleModal('920px')">넓은 모달 열기</button>
		</div>
	</section>
</th:block>

<th:block layout:fragment="script">
	<script th:inline="javascript">
		async function openSampleModal(width) {
			await openPopup({
				url: `${window.contextPath}/Test/ModalSample.html`,
				method: MethodType.Get,
				NotCheck: true,
				popupId: `testModal_${Date.now()}`,
				width
			});
		}
	</script>
</th:block>

</html>
